kind = "web"
previewPath = "/"
title = "XF Store"
version = "1.0.0"
id = "artifacts/xf-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20931

[services.development]
run = "pnpm --filter @workspace/xf-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/xf-store", "run", "build" ]
publicDir = "artifacts/xf-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20931"
BASE_PATH = "/"
